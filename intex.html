<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#ff758c,#681c3d);
        }

        .login-box{
            width:350px;
            padding:40px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius:20px;
            box-shadow:0 15px 25px rgba(0,0,0,0.2);
            text-align:center;
            color:white;
        }

        .login-box h2{
            margin-bottom:30px;
            font-size:28px;
        }

        .input-box{
            margin-bottom:20px;
        }

        .input-box input{
            width:100%;
            padding:12px;
            border:none;
            outline:none;
            border-radius:25px;
            font-size:16px;
        }

        .btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:25px;
            background:white;
            color:#ff4e7a;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:#ff4e7a;
            color:white;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Login</h2>

        <div class="input-box">
            <input type="text" placeholder="Username">
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password">
        </div>

         <a href="home.html"><button class="btn">Submit</button></a>
    </div>

</body>
</html>
